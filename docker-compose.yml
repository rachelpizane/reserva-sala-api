services:
  postgres:
    image: postgres:17-alpine
    container_name: postgres-reserva-sala
    environment:
      POSTGRES_DB: reserva-sala
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
  backend:
    build: .
    container_name: backend-reserva-sala
    depends_on:
      - postgres
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/reserva-sala
    ports:
      - "8080:8080"
volumes:
  postgres-data: